services:
  flask-app-1:
    image: obaidlona/myapp:${APP1_IMAGE_TAG:-v1}
    container_name: flask-app-1
    ports:
      - "8001:8000"
    environment:
      INSTANCE_NAME: flask-app-1
    networks:
      - mynetwork
    depends_on:
      - db

  flask-app-2:
    image: obaidlona/myapp:v1
    container_name: flask-app-2
    ports:
      - "8002:8000"
    environment:
      INSTANCE_NAME: flask-app-2
    networks:
      - mynetwork
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge